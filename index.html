<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxora Store</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- TOP NAV -->
    <header class="nav">

        <div class="logo">LUXORA</div>

        <nav class="links">
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Collections</a>
            <a href="#">Contact</a>
        </nav>

        <div class="nav-actions">

            <input id="search" placeholder="Search products...">

            <button id="theme">🌓</button>

            <div class="cart-btn">
                🛒 <span id="cartCount">0</span>
            </div>

        </div>

    </header>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-text">
            <h1>Luxury Shopping Experience</h1>
            <p>Premium products crafted for modern lifestyle</p>

            <div class="cta">
                <button>Explore</button>
                <button class="outline">Shop Now</button>
            </div>
        </div>

        <div class="hero-img">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
        </div>

    </section>

    <!-- FILTERS -->
    <section class="filters">

        <button data-filter="all">All</button>
        <button data-filter="watch">Watches</button>
        <button data-filter="tech">Tech</button>
        <button data-filter="fashion">Fashion</button>

    </section>

    <!-- PRODUCTS -->
    <section id="grid" class="grid"></section>

    <!-- CART DRAWER -->
    <div id="cart" class="cart">

        <div class="cart-header">
            <h2>Your Cart</h2>
            <button onclick="closeCart()">✕</button>
        </div>

        <div id="cartItems"></div>

        <div class="cart-footer">
            <h3>Total: $<span id="total">0</span></h3>
            <button onclick="checkout()">Checkout</button>
        </div>

    </div>

    <div id="overlay" onclick="closeCart()"></div>

    <script src="script.js"></script>
</body>

</html>
